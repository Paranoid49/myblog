{% extends "base.html" %}

{% block title %}标签：{{ tag.name }} - 我的博客{% endblock %}

{% block content %}
  <h1>标签：{{ tag.name }}</h1>
  {% if posts %}
    <ul>
      {% for post in posts %}
        <li><a href="/posts/{{ post.slug }}">{{ post.title }}</a></li>
      {% endfor %}
    </ul>
  {% else %}
    <p>暂无文章</p>
  {% endif %}
{% endblock %}
