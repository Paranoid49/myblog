{% extends "base.html" %}

{% block title %}首页 - {{ site_title or "我的博客" }}{% endblock %}

{% block content %}
  <h1>{{ site_title or "我的博客" }}</h1>
  <h2>最新文章</h2>
  {% if posts %}
    <ul>
      {% for post in posts %}
        <li>
          <a href="/posts/{{ post.slug }}">{{ post.title }}</a>
        </li>
      {% endfor %}
    </ul>
  {% else %}
    <p>暂无文章</p>
  {% endif %}
{% endblock %}
