<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <title>管理员登录</title>
  </head>
  <body>
    <h1>登录</h1>
    {% if error %}
    <p>{{ error }}</p>
    {% endif %}
    <form method="post" action="/admin/login">
      <label>
        用户名
        <input name="username" type="text" />
      </label>
      <label>
        密码
        <input name="password" type="password" />
      </label>
      <button type="submit">登录</button>
    </form>
  </body>
</html>
