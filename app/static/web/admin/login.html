<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>后台登录</title>
    <link rel="stylesheet" href="/static/web/assets/web.css" />
  </head>
  <body>
    <main class="container">
      <h1>后台登录</h1>
      <p id="login-error" class="error"></p>
      <form id="login-form">
        <label>
          用户名
          <input name="username" type="text" required />
        </label>
        <label>
          密码
          <input name="password" type="password" required />
        </label>
        <button type="submit">登录</button>
      </form>
    </main>
    <script type="module" src="/static/web/assets/auth.js"></script>
  </body>
</html>
